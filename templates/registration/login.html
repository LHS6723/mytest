{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width:400px">

  <h3 class="mb-4 text-center">로그인</h3>

  <form method="post">
    {% csrf_token %}

    <!-- Username / Email -->
<!-- Username -->
<div class="form-outline mb-4 d-flex justify-content-center align-items-center">
  <label class="form-label me-3 mb-0" style="width:80px;">아이디 :</label>
  {{ form.username }}
</div>

<!-- Password -->
<div class="form-outline mb-4 d-flex justify-content-center align-items-center">
  <label class="form-label me-3 mb-0" style="width:80px;">비밀번호 :</label>
  {{ form.password }}
</div>

    <!-- Remember + Forgot -->
    <div class="row mb-4">
      <div class="col d-flex justify-content-center">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe" checked />
          <label class="form-check-label" for="rememberMe">
            로그인 상태 유지
          </label>
        </div>
      </div>

      <div class="col text-end">
        <a href="#">비밀번호 찾기</a>
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn btn-primary w-100 mb-4">
      로그인
    </button>

    <!-- Signup -->
    <div class="text-center">
      <p>
        계정이 없나요?
        <a href="{% url 'signup' %}">회원가입</a>
      </p>
    </div>

  </form>

</div>
{% endblock %}
