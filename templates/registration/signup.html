{% extends 'base.html' %}

{% block content %}
<style>
/* 카드 디자인 */
.signup-card {
    background: #fff;
    border-radius: 15px;
    padding: 35px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* 제목 */
.signup-title {
    color: #ff7a00;
    font-weight: 700;
}

/* 버튼 */
.btn-primary {
    background-color: #ff7a00;
    border: none;
}

.btn-primary:hover {
    background-color: #e96b00;
}

/* 입력창 */
form p input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-top: 5px;
}

/* label 간격 */
form p {
    margin-bottom: 15px;
}

/* 링크 */
.login-link a {
    color: #ff7a00;
    font-weight: 500;
    text-decoration: none;
}

.login-link a:hover {
    text-decoration: underline;
}
</style>

<div class="container mt-5" style="max-width:450px">

    <div class="signup-card">

        <h4 class="text-center mb-4 signup-title">회원가입</h4>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary w-100 mb-3">
                회원가입
            </button>
        </form>

        <div class="text-center login-link">
            <p>
                이미 계정이 있나요?
                <a href="{% url 'login' %}">로그인</a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
