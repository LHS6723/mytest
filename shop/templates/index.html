{% extends 'base.html' %}
{% load static %}


{% block content %}
    <!-- Product Start -->
    <div class="container-xxl bg-light my-6 py-6 pt-0" style="margin: 12rem 0;">
        <div class="container">
            </div>
            <div class="text-center mx-auto mb-5 wow fadeInUp" data-wow-delay="0.1s" style="max-width: 500px;">
                <p class="text-primary text-uppercase mb-2">// Bakery Products</p>
                <h1 class="display-6 mb-4">Browse Our Bakery Selections</h1>
            </div>
            <div class="row g-4">
                {% for i in dishes %}
                <div class="col-lg-4 col-md-6 wow fadeInUp" data-wow-delay="0.1s">
                    <div class="product-item d-flex flex-column bg-white rounded overflow-hidden h-100">
                        <div class="text-center p-4">
                            <div class="d-inline-block border border-primary rounded-pill px-3 mb-3">{{i.price}}</div>
                            <h3 class="mb-3"><a href="{% url 'detail' i.id %}">{{i.name}}</a></h3>
                            <span>{{i.description}}</span>
                        </div>
                        <div class="position-relative mt-auto">
                            <a href="{% url 'detail' i.id %}"><img class="img-fluid" src="{{i.image.url}}" alt=""></a>
                            <div class="product-overlay">
                                <a class="btn btn-lg-square btn-outline-light rounded-circle" href="{% url 'detail' i.id %}"><i class="fa fa-eye text-primary"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}

            </div>
        </div>
    </div>
    <!-- Product End -->
    {% endblock %}
