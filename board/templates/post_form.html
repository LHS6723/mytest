{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
/* 화면 중앙 배치 */
.form-wrapper {
    min-height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fff5e6 0%, #fff2e0 100%);
}

/* 카드 스타일 */
.form-card {
    width: 100%;
    max-width: 600px;
    background-color: #fff8f0;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    padding: 40px 30px;
    transition: transform 0.2s;
}

.form-card:hover {
    transform: translateY(-3px);
}

/* 제목 */
.form-card h1 {
    font-weight: 700;
    font-size: 2rem;
    color: #d97706;
    text-align: center;
    margin-bottom: 25px;
}

/* 입력폼 스타일 */
input.form-control, textarea.form-control {
    border-radius: 12px;
    border: 1px solid #f0a858;
    padding: 10px 15px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
}

/* textarea 크기 */
textarea.form-control {
    resize: none;
}

/* 버튼 스타일 */
.btn-primary {
    background-color: #fb923c;
    border-color: #fb923c;
    border-radius: 12px;
    padding: 8px 25px;
    font-weight: 600;
    transition: all 0.2s;
}

.btn-primary:hover {
    background-color: #f97316;
    border-color: #f97316;
    transform: translateY(-2px);
}

.btn-outline-secondary {
    border-radius: 12px;
    padding: 8px 25px;
    font-weight: 600;
}

/* 링크 스타일 */
a {
    text-decoration: none;
    color: #d97706;
}

a:hover {
    color: #f97316;
}

/* 폼 여백 */
.form-group {
    margin-bottom: 20px;
}
</style>

<div class="form-wrapper">
    <div class="form-card">

        <h1>글 작성</h1>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label fw-semibold">제목</label>
                {{ form.title }}
            </div>

            <div class="form-group">
                <label class="form-label fw-semibold">내용</label>
                {{ form.content }}
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'post_list' %}" class="btn btn-outline-secondary">취소</a>
                <button type="submit" class="btn btn-primary">저장</button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
